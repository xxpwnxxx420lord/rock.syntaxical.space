<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROCK</title>
  <style>
    .stage { justify-content: center; }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: rgb(35,35,35); }
    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      overflow: hidden;
      position: relative;
    }
    .grain {
      position: fixed; inset: 0; pointer-events: none; z-index: 10; opacity: 0.045;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 256px 256px;
    }
    .scanlines {
      position: fixed; inset: 0; pointer-events: none; z-index: 9;
      background: repeating-linear-gradient(to bottom, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    }
    .stage {
      display: flex; flex-direction: column; align-items: center;
      animation: fadein 0.8s ease both;
    }
    @keyframes fadein { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    canvas { display: block; filter: drop-shadow(0 24px 60px rgba(0,0,0,0.9)) drop-shadow(0 4px 14px rgba(0,0,0,0.7)); }
    .rock-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 14vw, 9rem);
      letter-spacing: 0.18em;
      color: transparent;
      -webkit-text-stroke: 1px #3a3a3a;
      line-height: 1;
      margin-top: -14px;
      text-align: center;
      width: 100%;
      user-select: none;
    }
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 14px 28px; display: flex; justify-content: space-between; align-items: center;
      border-top: 1px solid #2c2c2c; z-index: 20;
    }
    .refresh-hint { font-size: 0.6rem; color: #383838; letter-spacing: 0.2em; text-transform: uppercase; }
    .rock-id { font-size: 0.6rem; color: #383838; letter-spacing: 0.15em; font-style: italic; }
    .bottom-left { display: flex; flex-direction: column; gap: 4px; }
    .source-link { font-size: 0.58rem; color: #383838; letter-spacing: 0.1em; text-decoration: none; }
    .source-link:hover { color: #666; }
    .project-tag { font-size: 0.58rem; color: #333; letter-spacing: 0.12em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="grain"></div>
  <div class="scanlines"></div>
  <div class="stage">
    <canvas id="c" width="420" height="420"></canvas>
    <div class="rock-title">ROCK</div>
  </div>
  <div class="bottom-bar">
    <div class="bottom-left">
      <a class="source-link" href="http://github.com/xxpwnxxx420lord/rock.syntaxical.space" target="_blank">source: github.com/xxpwnxxx420lord/rock.syntaxical.space</a>
      <span class="project-tag">the useless web project</span>
    </div>
    <span class="refresh-hint">↻ refresh for new specimen</span>
    <span class="rock-id" id="rockid"></span>
  </div>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 420, H = 420, cx = W/2, cy = H/2;

    let seed = (Math.random() * 0xFFFFFF | 0) ^ Date.now();
    document.getElementById('rockid').textContent = 'ID #' + seed.toString(16).toUpperCase().padStart(6,'0');

    function rand(min, max) {
      seed ^= seed << 13; seed ^= seed >> 17; seed ^= seed << 5;
      return min + (Math.abs(seed) / 0x7FFFFFFF) * (max - min);
    }

    function noise2D(x, y, s) {
      let h = (x * 374761393 + y * 668265263 + s * 2246822519) | 0;
      h ^= h >> 15; h = Math.imul(h, 0x45d9f3b); h ^= h >> 15;
      return (h & 0xFFFF) / 0xFFFF;
    }

    function smoothstep(t) { return t * t * (3 - 2 * t); }

    function fractalNoise(x, y, octaves) {
      let v = 0, amp = 1, freq = 1, max = 0;
      for (let i = 0; i < octaves; i++) {
        const xi = Math.floor(x * freq), yi = Math.floor(y * freq);
        const xf = (x * freq) - xi, yf = (y * freq) - yi;
        const sx = smoothstep(xf), sy = smoothstep(yf);
        const n00 = noise2D(xi, yi, i), n10 = noise2D(xi+1, yi, i);
        const n01 = noise2D(xi, yi+1, i), n11 = noise2D(xi+1, yi+1, i);
        v += (n00*(1-sx)*(1-sy) + n10*sx*(1-sy) + n01*(1-sx)*sy + n11*sx*sy) * amp;
        max += amp; amp *= 0.5; freq *= 2;
      }
      return v / max;
    }

    const rockType  = Math.floor(rand(0, 5));
    const baseR     = rand(48, 168);
    const numPts    = Math.floor(rand(7, 24));
    const squashX   = rand(0.42, 1.45);
    const squashY   = rand(0.42, 1.18);
    const tilt      = rand(0, Math.PI * 2);
    const jagged    = rand(0.25, 1.0);
    const baseGray  = rand(65, 125) | 0;
    const typeRMult = [1.0, 0.65, 1.35, 0.82, 1.12][rockType];
    const typeJag   = [0.55, 0.95, 0.3, 0.78, 0.5][rockType];
    const noiseAmt  = 52 + jagged * 68;

    const pts = [];
    for (let i = 0; i < numPts; i++) {
      const angle = (i / numPts) * Math.PI * 2;
      const n = fractalNoise(Math.cos(angle)*0.5+0.5, Math.sin(angle)*0.5+0.5, 5);
      const spike = typeJag > 0.65 && rand(0,1) > 0.68 ? rand(0.55, 1.45) : 1.0;
      const r = baseR * typeRMult + (n - 0.5) * noiseAmt * spike;
      const a = angle + tilt;
      pts.push({ x: cx + Math.cos(a)*r*squashX, y: cy + Math.sin(a)*r*squashY });
    }

    function buildPath() {
      ctx.beginPath();
      ctx.moveTo((pts[pts.length-1].x + pts[0].x)/2, (pts[pts.length-1].y + pts[0].y)/2);
      for (let i = 0; i < pts.length; i++) {
        const a = pts[i], b = pts[(i+1) % pts.length];
        ctx.quadraticCurveTo(a.x, a.y, (a.x+b.x)/2, (a.y+b.y)/2);
      }
      ctx.closePath();
    }

    const hi = baseGray+56, mid = baseGray, lo = baseGray-38;
    const ambient = ctx.createRadialGradient(cx-45, cy-58, 12, cx+18, cy+28, 188);
    ambient.addColorStop(0.0, `rgb(${hi},${hi-2},${hi-6})`);
    ambient.addColorStop(0.4, `rgb(${mid},${mid-3},${mid-7})`);
    ambient.addColorStop(0.78,`rgb(${lo+8},${lo+5},${lo})`);
    ambient.addColorStop(1.0, `rgb(${lo-12},${lo-15},${lo-20})`);
    buildPath(); ctx.fillStyle = ambient; ctx.fill();

    ctx.save(); buildPath(); ctx.clip();

    const texCanvas = document.createElement('canvas');
    texCanvas.width = W; texCanvas.height = H;
    const tctx = texCanvas.getContext('2d');
    const imgData = tctx.createImageData(W, H);
    const data = imgData.data;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        const n = fractalNoise(x/W*4, y/H*4, 6);
        const v = (n - 0.5) * 36;
        const r = Math.min(255, Math.max(0, baseGray + v));
        const idx = (y*W+x)*4;
        data[idx]=r-2; data[idx+1]=r-4; data[idx+2]=r-8; data[idx+3]=85;
      }
    }
    tctx.putImageData(imgData, 0, 0);
    ctx.drawImage(texCanvas, 0, 0);

    const numCracks = Math.floor(rand(5, 15));
    for (let c = 0; c < numCracks; c++) {
      let px = cx+rand(-95,95), py = cy+rand(-85,85);
      const steps = Math.floor(rand(5, 18));
      const op = rand(0.06, 0.3), lw = rand(0.4, 2.6);
      ctx.beginPath(); ctx.moveTo(px, py);
      let angle = rand(0, Math.PI*2);
      for (let s = 0; s < steps; s++) {
        angle += rand(-0.9, 0.9);
        const len = rand(7, 26);
        px += Math.cos(angle)*len; py += Math.sin(angle)*len;
        ctx.lineTo(px, py);
        if (rand(0,1) > 0.7) {
          let bx = px, by = py, ba = angle + rand(0.5,1.3)*(rand(0,1)>0.5?1:-1);
          ctx.moveTo(bx,by);
          for (let b = 0; b < Math.floor(rand(2,5)); b++) {
            ba += rand(-0.4,0.4); bx += Math.cos(ba)*rand(5,16); by += Math.sin(ba)*rand(5,16);
            ctx.lineTo(bx,by);
          }
          ctx.moveTo(px,py);
        }
      }
      ctx.strokeStyle=`rgba(0,0,0,${op})`; ctx.lineWidth=lw; ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
      ctx.strokeStyle=`rgba(255,255,255,${op*0.15})`; ctx.lineWidth=lw*0.4; ctx.stroke();
    }

    for (let s = 0; s < Math.floor(rand(35,85)); s++) {
      const sx=cx+rand(-130,130), sy=cy+rand(-115,115), sr=rand(0.4,3.8);
      const bright=rand(0,1)>0.55, sc=(bright?rand(138,188):rand(28,58))|0;
      ctx.beginPath(); ctx.arc(sx,sy,sr,0,Math.PI*2);
      ctx.fillStyle=`rgba(${sc},${sc-2},${sc-5},${rand(0.05,0.2)})`; ctx.fill();
    }

    const hlG = ctx.createRadialGradient(cx-58,cy-68,4,cx-28,cy-38,92);
    hlG.addColorStop(0,`rgba(255,255,255,${rand(0.07,0.2)})`);
    hlG.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=hlG; buildPath(); ctx.fill();

    const rimG = ctx.createRadialGradient(cx+52,cy+62,55,cx+52,cy+62,175);
    rimG.addColorStop(0,'rgba(0,0,0,0)');
    rimG.addColorStop(1,`rgba(0,0,0,${rand(0.2,0.42)})`);
    ctx.fillStyle=rimG; buildPath(); ctx.fill();

    ctx.restore();

    buildPath(); ctx.strokeStyle='rgba(0,0,0,0.55)'; ctx.lineWidth=2.5; ctx.stroke();
    buildPath(); ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1; ctx.stroke();
  </script>
</body>
</html>
